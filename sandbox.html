<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebStudio</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/sandbox-styles.css" />
  </head>
  <body>
    <section class="section">
      <h1>Effective Solutions for Your Business</h1>
      <table class="table-border-collapse">
        <tr>
          <td class="table-data-border">First name</td>
          <td class="table-data-border">Last name</td>
        </tr>
        <tr>
          <td class="table-data-border">Pavlo</td>
          <td class="table-data-border">Gurskiy</td>
        </tr>
        <tr>
          <td class="table-data-border">Olena</td>
          <td class="table-data-border">Budnikova</td>
        </tr>
      </table>
      <a
        href="https://google.com"
        class="tomatoLink"
        target="_blank"
        rel="noopener noreferrer"
        >Посилання на Google пошук</a
      >
      <a
        href="https://google.com"
        class="tomatoLink"
        target="_blank"
        rel="noopener noreferrer"
        ><img
          src="https://images.pexels.com/photos/67112/pexels-photo-67112.jpeg"
          alt="Пошук Google"
          width="320"
          title="Пошук Google"
      /></a>

      <input class="input" type="text" placeholder="Enter your name" />

      <button class="color-btn" type="button">Змінити колір кнопки</button>
    </section>

    <script>
      const button = document.querySelector(".color-btn");

      button.addEventListener("click", () => {
        const randomColor = `#${Math.floor(Math.random() * 16777215)
          .toString(16)
          .padStart(6, "0")}`;

        const randomBorderColor = `#${Math.floor(Math.random() * 16777215)
          .toString(16)
          .padStart(6, "0")}`;

        button.style.backgroundColor = randomColor;
        button.style.borderColor = randomBorderColor;
      });
    </script>
  </body>
</html>
